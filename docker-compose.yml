services:
  postgres:
    image: postgres:16
    container_name: streamnest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: videohub
      POSTGRES_PASSWORD: videohub_password
      POSTGRES_DB: videohub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videohub -d videohub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
