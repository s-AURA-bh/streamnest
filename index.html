<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Snake</h1>
      <div class="hud">
        <span>Score: <strong id="score">0</strong></span>
        <span id="status">Running</span>
      </div>

      <div id="board" class="board" aria-label="Snake game board"></div>

      <div class="actions">
        <button id="pauseBtn" type="button">Pause</button>
        <button id="restartBtn" type="button">Restart</button>
      </div>

      <div class="controls" aria-label="On-screen controls">
        <button data-dir="up" type="button">Up</button>
        <div class="controls-row">
          <button data-dir="left" type="button">Left</button>
          <button data-dir="down" type="button">Down</button>
          <button data-dir="right" type="button">Right</button>
        </div>
      </div>

      <p class="hint">
        Controls: Arrow keys or WASD. Press Space to pause/resume.
      </p>
    </main>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
